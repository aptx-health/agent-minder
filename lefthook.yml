pre-commit:
  parallel: true
  commands:
    build:
      run: go build ./...
    lint:
      run: golangci-lint run ./...
    fmt:
      glob: "*.go"
      run: |
        UNFMTED=$(gofmt -l {staged_files} 2>&1)
        if [ -n "$UNFMTED" ]; then
          echo "Files not formatted:"
          echo "$UNFMTED"
          exit 1
        fi
