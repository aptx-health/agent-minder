jobs:
  # --- Trigger routes (label→agent) ---
  bug-fix:
    trigger: "label:bug"
    agent: bug-fixer
    description: "Fix bugs automatically"
    budget: 5.0

  agent-ready:
    trigger: "label:agent-ready"
    agent: autopilot
    description: "Pick up and work on labeled issues"
    budget: 5.0

  # --- Weekly cron schedules (UTC times) ---
  weekly-deps:
    schedule: "0 15 * * 1"
    agent: dependency-updater
    description: "Check for outdated Go dependencies"
    budget: 3.0

  weekly-security:
    schedule: "0 12 * * 3"
    agent: security-scanner
    description: "Scan for known vulnerabilities and security anti-patterns"
    budget: 2.0

  weekly-docs:
    schedule: "0 14 * * 5"
    agent: doc-updater
    description: "Update docs to reflect recent code changes"
    budget: 3.0
